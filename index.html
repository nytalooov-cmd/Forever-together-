```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Forever Together</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #250000);
            color: white;
            font-family: "Georgia", serif;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            animation: appear 2s ease;
        }

        h1 {
            color: #ff4d6d;
            font-size: 45px;
        }

        p {
            font-size: 20px;
            color: #eeeeee;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart {
            font-size: 50px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>Forever Together</h1>
        <p>привет любовь моя✨</p>
    </div>

</body>
</html>
